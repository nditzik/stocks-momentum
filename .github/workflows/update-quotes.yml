name: Update delayed quotes

on:
  schedule:
    # Every 15 minutes, Mon-Fri, 13:00-21:00 UTC.
    # Covers US market hours 09:30-16:00 ET (both EST and EDT) with buffer.
    - cron: "*/15 13-21 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-quotes
  cancel-in-progress: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install requests

      - name: Fetch quotes
        run: python scripts/fetch_quotes.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/quotes.json
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "chore: refresh delayed quotes"
            git push
          fi
